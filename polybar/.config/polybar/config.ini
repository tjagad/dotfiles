[colors]
 rosewater = #f4dbd6
 flamingo = #f0c6c6
 pink = #f5bde6
 mauve = #c6a0f6
 red = #ed8796
 maroon = #ee99a0
 peach = #f5a97f
 yellow = #eed49f
 green = #a6da95
 teal = #8bd5ca
 sky = #91d7e3
 sapphire = #7dc4e4
 blue = #8aadf4
 lavender = #b7bdf8
 text = #cad3f5
 subtext1 = #b8c0e0
 subtext0 = #a5adcb
 overlay2 = #939ab7
 overlay1 = #8087a2
 overlay0 = #6e738d
 surface2 = #5b6078
 surface1 = #494d64
 surface0 = #363a4f
 base = #24273a
 mantle = #1e2030
 crust = #181926
 transparent = #FF00000

[bar/bar]
width = 100%
height = 20pt
radius = 6

dpi = 96

line-size = 3pt

border-size = 2pt
background = ${colors.base}
foreground = ${colors.text}
;foreground = ${colors.surface0}
;border-color = ${colors.surface0}
border-color = ${colors.crust}

padding-left = 0
padding-right = 0

module-margin = 1
monitor = ${env:MONITOR:}

separator = ÔÖā
;separator = ÔĄÖ
; separator = ÓāĪ
separator-foreground = ${colors.overlay2}

font-0 = "Maple Mono NF:size=12:weight=bold;4"
font-1 = "MonacoLigaturized Nerd Font Mono:size=12;4"

modules-left = xworkspaces xwindow
; modules-right = memory cpu wlan eth pulseaudio backlight battery date
modules-right = wlan eth pulseaudio backlight battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

pin-workspaces = true
show-urgent = true
index-sort = true

tray-position = right
tray-scale = 1.0
tray-maxsize = 28
tray-padding = 5

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces
group-by-monitor = true

icon-0 = 1;ůį¨ļ
icon-1 = 2;ůį¨Ľ
icon-2 = 3;ůį¨ľ
icon-3 = 4;ůį¨Ĺ
icon-4 = 5;ůį¨ĺ
icon-5 = 6;ůį¨Ņ
icon-6 = 7;ůį≠Ä
icon-7 = 8;ůį≠Ā
icon-8 = 9;ůį≠ā
icon-9 = 10;ůįŅ©

label-active = %icon%
label-active-font = 2
label-active-foreground = ${colors.base}
label-active-background = ${colors.mauve}
label-active-padding = 1

label-occupied = %icon%
label-occupied-font = 2
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-font = 2
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-font = 2
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = " %percentage:3%%"

label-muted = ÔĎ¶    0%
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%

format-disconnected = <label-disconnected>
label-disconnected = ůį§ģ
;label-connected = Ôáę  %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®

[module/eth]
inherit = network-base
interface-type = wired
interface = bridge0
label-connected = ÓľČ  %local_ip%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ"
format-prefix-foreground = ${colors.primary}
label = "  %percentage_used:2%%"

[module/cpu]
type = internal/cpu
warn-percentage = 95
interval = 2
format-prefix = "Ôíľ"
format-prefix-foreground = ${colors.primary}
label = "  %percentage:2%%"

[module/date]
type = internal/date
interval = 1

date = ÔÄó  %H:%M
date-alt = ÔĀ≥ %Y-%m-%d ÔÄó %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 100
low-at = 5
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = AC0
poll-interval = 5
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <animation-low> <label-low>

